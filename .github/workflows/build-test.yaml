name: CI - Dagger Build & Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: {% raw %}${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}{% endraw %}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Dagger lint
        uses: dagger/dagger-for-github@v8.4.0
        with:
          module: ./dagger
          call: lint --src . --progress plain
          cloud-token: {% raw %}${{ secrets.DAGGER_CLOUD_TOKEN }}{% endraw %}
      - name: Dagger build-and-test
        uses: dagger/dagger-for-github@v8.4.0
        with:
          module: ./dagger
          call: build-and-test-binary --source . --progress plain
          cloud-token: {% raw %}${{ secrets.DAGGER_CLOUD_TOKEN }}{% endraw %}
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: dagger-logs
          path: |
            ~/.cache/dagger
            /tmp/dagger-*.log
